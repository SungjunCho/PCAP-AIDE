<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCAP-AIDE: AI-Driven IDS Signature Generation and Evaluation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .proto-badge { display:inline-block; padding:2px 9px; border-radius:12px; font-size:11px; font-weight:bold; color:#fff; margin-right:4px; }
        .proto-HTTP   { background:#3498db; } .proto-DNS  { background:#9b59b6; }
        .proto-FTP    { background:#e67e22; } .proto-TELNET{ background:#e74c3c; }
        .proto-SMTP   { background:#2ecc71; } .proto-OTHER { background:#95a5a6; }

        .proto-breakdown { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0; }
        .proto-chip { display:flex; align-items:center; gap:5px; background:#f0f0f0; border-radius:20px; padding:4px 12px; font-size:12px; }
        .proto-chip-dot { width:9px; height:9px; border-radius:50%; }

        /* Frame 레이블 */
        .frame-label {
            display:inline-block; background:#2c3e50; color:#f1c40f;
            font-size:10px; font-weight:bold; padding:1px 7px; border-radius:3px;
            margin-right:5px; font-family:monospace; letter-spacing:0.5px;
        }

        /* 룰 심각도 */
        .sev-CRITICAL { color:#c0392b; } .sev-HIGH   { color:#d35400; }
        .sev-MEDIUM   { color:#b7950b; } .sev-LOW    { color:#2471a3; }

        /* Hex+ASCII 나란히 보기 */
        .hexdump-wrap {
            font-family:'Courier New', monospace; font-size:11px;
            background:#0d1117; color:#c9d1d9; border-radius:6px;
            padding:10px 14px; overflow-x:auto; line-height:1.7; margin-top:6px;
        }
        .hexdump-wrap table { border-collapse:collapse; }
        .hexdump-wrap td { padding:0 5px; white-space:pre; vertical-align:top; }
        .hd-offset { color:#6e7681; width:75px; }
        .hd-hex    { color:#79c0ff; width:360px; letter-spacing:0.4px; }
        .hd-ascii  { color:#a5d6a7; border-left:1px solid #30363d; padding-left:10px !important; }

        /* 패킷별 룰 박스 */
        .pkt-rules-box { background:#1a1a2e; border-radius:4px; padding:8px 12px; margin-top:5px; }
        .pkt-rule-entry { padding:2px 0; border-bottom:1px solid #2a2a4a; font-family:monospace; font-size:10px; word-break:break-all; }
        .pkt-rule-entry:last-child { border-bottom:none; }

        /* ── 레이아웃 ── */
        .upload-area { border:3px dashed #ccc; border-radius:10px; padding:50px; text-align:center; background:#f9f9f9; cursor:pointer; transition:all .3s; margin:20px 0; }
        .upload-area.dragover { border-color:#667eea; background:#f0f3ff; }
        .upload-icon { font-size:48px; margin-bottom:10px; }
        .select-btn  { background:#667eea; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-top:10px; }
        .analyze-btn { background:#28a745; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-size:16px; width:100%; margin-top:10px; }
        .progress-bar  { width:100%; height:20px; background:#f0f0f0; border-radius:10px; overflow:hidden; margin:20px 0; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#667eea,#764ba2); width:0%; transition:width .3s; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:15px; margin:20px 0; }
        .stat-card  { background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,.1); text-align:center; }
        .stat-value { font-size:26px; font-weight:bold; color:#667eea; }
        .stat-label { color:#666; font-size:13px; margin-top:4px; }
        .file-result { background:#fff; border-radius:8px; margin:15px 0; box-shadow:0 2px 5px rgba(0,0,0,.1); overflow:hidden; }
        .file-result.has-patterns { border-left:5px solid #dc3545; }
        .file-result.error        { border-left:5px solid #dc3545; background:#fff8f8; }
        .file-header { padding:15px; background:#f8f9fa; cursor:pointer; display:flex; align-items:center; gap:10px; }
        .file-name   { flex:1; font-weight:bold; }
        .file-badge  { background:#667eea; color:#fff; padding:3px 10px; border-radius:15px; font-size:12px; }
        .file-score  { padding:3px 10px; border-radius:15px; font-size:12px; font-weight:bold; }
        .score-low   { background:#d4edda; color:#155724; } .score-medium { background:#fff3cd; color:#856404; } .score-high { background:#f8d7da; color:#721c24; }
        .file-content { padding:20px; border-top:1px solid #ddd; }
        .file-stats  { display:flex; gap:20px; margin-bottom:15px; padding:10px; background:#f8f9fa; border-radius:5px; font-size:13px; }
        .tabs { display:flex; gap:5px; margin-bottom:15px; }
        .tab-btn { padding:8px 15px; border:none; background:#e9ecef; cursor:pointer; border-radius:5px; }
        .tab-btn.active { background:#667eea; color:#fff; }
        .tab-content { display:none; } .tab-content.active { display:block; }
        .rules-list { background:#1e1e1e; color:#d4d4d4; padding:15px; border-radius:5px; max-height:300px; overflow-y:auto; font-family:monospace; font-size:11px; }
        .rule-line   { padding:2px 0; border-bottom:1px solid #2a2a2a; }
        .payload-item { padding:10px; border:1px solid #eee; margin:5px 0; border-radius:5px; }
        .payload-item.has-pattern { border-left:3px solid #dc3545; background:#fff8f8; }
        .mini-badge { background:#dc3545; color:#fff; padding:2px 8px; border-radius:3px; font-size:10px; margin-right:5px; }
        .action-buttons { display:flex; gap:10px; margin:20px 0; }
        .btn-primary   { background:#28a745; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; }
        .btn-secondary { background:#007bff; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; }
        .pattern-warning { background:#fff3cd; padding:8px; border-radius:4px; margin:8px 0; font-size:13px; color:#856404; }
    </style>
</head>
<body>
<div class="container">
    <h1>📦 PCAP-AIDE: AI-Driven IDS Signature Generation and Evaluation System
      <a href="/keywords" style="font-size:13px;font-weight:normal;margin-left:14px;
         background:#2c3e50;color:#f1c40f;padding:3px 11px;border-radius:5px;text-decoration:none;">🔑 Keywords</a>
      <a href="/auto-learn" style="font-size:13px;font-weight:normal;margin-left:7px;
         background:#1a6b3a;color:#2ecc71;padding:3px 11px;border-radius:5px;text-decoration:none;">🤖 Auto Learn</a>
    </h1>
    <p style="color:#666; margin-top:-6px;">Protocols: <strong>HTTP · DNS · FTP · Telnet · SMTP · ICMP</strong>
       &nbsp;·&nbsp; <span style="color:#2e7d32; font-size:12px;">🤖 자동학습 활성화됨</span>
    </p>

    <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📁</div>
        <h3>Drop PCAP files here or click to select</h3>
        <p>Supports multiple .pcap / .pcapng files (Max 500 MB)</p>
        <input type="file" id="fileInput" multiple accept=".pcap,.pcapng,.PCAP,.PCAPNG" style="display:none;">
        <button class="select-btn" onclick="document.getElementById('fileInput').click()">Select Files</button>
    </div>

    <div id="fileList"></div>

    <div id="progressArea" style="display:none;">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <p id="progressText">Processing…</p>
    </div>

    <!-- 자동학습 결과 배너 -->
    <div id="learnBanner" style="display:none; margin:14px 0; padding:12px 18px;
         background:#eafaf1; border:1px solid #27ae60; border-radius:8px; font-size:13px; color:#1e8449;">
    </div>

    <div id="resultsArea" style="display:none;">
        <div class="results-header">
            <h2>Analysis Results</h2>
            <div class="action-buttons">
                <button onclick="downloadAllRules()" class="btn-primary">📥 Download All Rules</button>
                <button onclick="downloadZip()"      class="btn-secondary">📦 Download ZIP</button>
            </div>
        </div>
        <div id="statsArea"></div>
        <div id="fileResults"></div>
    </div>
</div>

<script>
const PROTO_COLORS = { HTTP:'#3498db', DNS:'#9b59b6', FTP:'#e67e22', TELNET:'#e74c3c', SMTP:'#2ecc71', OTHER:'#95a5a6' };
let selectedFiles = [], analysisResults = [];

const uploadArea   = document.getElementById('uploadArea');
const fileInput    = document.getElementById('fileInput');
const progressArea = document.getElementById('progressArea');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const resultsArea  = document.getElementById('resultsArea');
const statsArea    = document.getElementById('statsArea');
const fileResults  = document.getElementById('fileResults');

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function isPcapFile(name) {
    const lower = name.toLowerCase();
    return lower.endsWith('.pcap') || lower.endsWith('.pcapng');
}

function handleFiles(files) {
    const all      = Array.from(files);
    selectedFiles  = all.filter(f => isPcapFile(f.name));
    const rejected = all.filter(f => !isPcapFile(f.name));

    if (!selectedFiles.length) {
        alert('PCAP 파일을 선택해주세요.\n지원 형식: .pcap, .pcapng (대소문자 무관)');
        return;
    }

    const fl = document.getElementById('fileList');
    let html = '<h4>Selected Files:</h4><ul>';
    selectedFiles.forEach(f => { html += `<li>✅ ${f.name} (${(f.size/1024).toFixed(2)} KB)</li>`; });
    if (rejected.length) {
        rejected.forEach(f => { html += `<li style="color:#e74c3c">❌ ${f.name} — unsupported format (skipped)</li>`; });
    }
    html += `</ul><button onclick="uploadFiles()" class="analyze-btn">🔍 Analyze ${selectedFiles.length} File(s)</button>`;
    fl.innerHTML = html;
}

async function uploadFiles() {
    const fd = new FormData();
    selectedFiles.forEach(f => fd.append('pcap_files', f));
    document.getElementById('fileList').style.display = 'none';
    progressArea.style.display = 'block';
    resultsArea.style.display  = 'none';
    let prog = 0;
    const iv = setInterval(() => { prog = Math.min(prog+5, 85); progressFill.style.width=prog+'%'; progressText.textContent=`Processing… ${prog}%`; }, 300);
    try {
        const res  = await fetch('/analyze', { method:'POST', body:fd });
        clearInterval(iv); progressFill.style.width='100%'; progressText.textContent='Done!';
        if (!res.ok) {
            // 서버 오류 메시지를 JSON에서 꺼내 표시
            let errMsg = `Server error ${res.status}`;
            try { const ej = await res.json(); errMsg = ej.error || errMsg; } catch(_) {}
            throw new Error(errMsg);
        }
        const data = await res.json();
        analysisResults = data.results || [];
        setTimeout(() => {
            progressArea.style.display = 'none';
            resultsArea.style.display  = 'block';
            renderStats(data.statistics || {});
            renderResults(analysisResults);
            renderLearnBanner(analysisResults);
        }, 500);
    } catch(e) {
        clearInterval(iv); progressArea.style.display='none';
        alert('분석 실패: ' + e.message);
        document.getElementById('fileList').style.display='block';
    }
}

// ── 통계 렌더링 ──────────────────────────────
function renderLearnBanner(results) {
    const banner = document.getElementById('learnBanner');
    let totalAdded = 0, totalAnalyzed = 0, totalNewCats = 0;
    const details = [];
    results.forEach(r => {
        const lr = r.learn_result;
        if (!lr) return;
        totalAdded    += lr.added    || 0;
        totalAnalyzed += lr.analyzed || 0;
        totalNewCats  += lr.new_cats || 0;
        if ((lr.details || []).length) details.push(...lr.details);
    });
    if (totalAnalyzed === 0) { banner.style.display='none'; return; }
    if (totalAdded > 0) {
        const det = details.slice(0,10).map(d=>`<span style="font-family:monospace;font-size:11px;">${esc(d)}</span>`).join('<br>');
        banner.innerHTML = `<strong>🤖 자동학습 완료</strong> — <strong>${totalAdded}개</strong> 신규 키워드 추가됨
            ${totalNewCats>0?`· <strong>${totalNewCats}개</strong> 신규 카테고리`:''}
            · 분석 대상 ${totalAnalyzed}개 패킷
            <a href="/auto-learn" style="margin-left:10px;color:#1a5c38;font-weight:bold;">📋 상세 보기 →</a>
            <details style="margin-top:8px;"><summary style="cursor:pointer;font-size:12px;">세부 내역</summary>
            <div style="margin-top:6px;">${det}</div></details>`;
        banner.style.background='#eafaf1'; banner.style.borderColor='#27ae60'; banner.style.color='#1e8449';
    } else {
        banner.innerHTML = `🤖 자동학습: ${totalAnalyzed}개 패킷 분석 완료 — 신규 키워드 없음`;
        banner.style.background='#f0f4f8'; banner.style.borderColor='#95a5a6'; banner.style.color='#5d6d7e';
    }
    banner.style.display = 'block';
}

function renderStats(s) {
    const ps = s.proto_stats || {};
    const chips = Object.entries(ps).filter(([,v])=>v>0).map(([k,v])=>
        `<div class="proto-chip"><span class="proto-chip-dot" style="background:${PROTO_COLORS[k]||'#999'}"></span><strong>${k}</strong>: ${v} rules</div>`
    ).join('');

    const ts = s.traffic_summary || [];
    const tt = s.traffic_total   || {};
    let trafficHtml = '';

    if (ts.length > 0) {
        const fmtB = b => b>=1048576?(b/1048576).toFixed(1)+' MB':b>=1024?(b/1024).toFixed(1)+' KB':b+' B';
        const rows = ts.map(row => {
            const col    = PROTO_COLORS[row.proto] || '#95a5a6';
            const isZero = (row.total === 0);
            const dim    = isZero ? 'opacity:0.35;' : '';
            const dash   = '—';
            return `<tr style="${dim}" onmouseover="this.style.background='#1a2a3a'" onmouseout="this.style.background=''">
                <td style="padding:9px 12px;"><span style="display:inline-flex;align-items:center;gap:6px;">
                    <span style="width:10px;height:10px;border-radius:50%;background:${col};display:inline-block;${isZero?'opacity:0.4;':''}"></span>
                    <strong style="color:${isZero?'#566573':'#e0e0e0'};">${esc(row.proto)}</strong></span></td>
                <td style="padding:9px 12px;text-align:right;color:${isZero?'#566573':'#e0e0e0'};font-weight:bold;">${isZero?dash:row.total}</td>
                <td style="padding:9px 12px;text-align:right;color:#5dade2;font-weight:bold;">${isZero?dash:row.tx}</td>
                <td style="padding:9px 12px;text-align:right;color:#58d68d;font-weight:bold;">${isZero?dash:row.rx}</td>
                <td style="padding:9px 12px;text-align:right;color:#f39c12;font-size:12px;">${isZero?dash:row.other>0?row.other:dash}</td>
                <td style="padding:9px 12px;">
                    <div style="display:flex;align-items:center;gap:7px;">
                        <div style="flex:1;background:#1a3a4a;border-radius:3px;height:7px;overflow:hidden;min-width:70px;">
                            <div style="height:100%;width:${row.pct_frames}%;background:${col};border-radius:3px;"></div>
                        </div>
                        <span style="color:#bdc3c7;font-size:11px;min-width:36px;text-align:right;">${isZero?'0%':row.pct_frames+'%'}</span>
                    </div></td>
                <td style="padding:9px 12px;text-align:right;color:#bdc3c7;font-size:12px;">${isZero?dash:fmtB(row.bytes)}</td>
                <td style="padding:9px 12px;">
                    <div style="display:flex;align-items:center;gap:7px;">
                        <div style="flex:1;background:#1a3a4a;border-radius:3px;height:7px;overflow:hidden;min-width:60px;">
                            <div style="height:100%;width:${row.pct_bytes}%;background:${col};opacity:0.7;border-radius:3px;"></div>
                        </div>
                        <span style="color:#bdc3c7;font-size:11px;min-width:36px;text-align:right;">${isZero?'0%':row.pct_bytes+'%'}</span>
                    </div></td>
            </tr>`;
        }).join('');
        const totalRow = tt.total?`<tr style="border-top:2px solid #2c4a6a;background:#0d1923;">
            <td style="padding:9px 12px;color:#f1c40f;font-weight:bold;">합계</td>
            <td style="padding:9px 12px;text-align:right;color:#f1c40f;font-weight:bold;">${tt.total}</td>
            <td style="padding:9px 12px;text-align:right;color:#5dade2;font-weight:bold;">${tt.tx||0}</td>
            <td style="padding:9px 12px;text-align:right;color:#58d68d;font-weight:bold;">${tt.rx||0}</td>
            <td style="padding:9px 12px;text-align:right;color:#f39c12;font-weight:bold;">${(tt.total-(tt.tx||0)-(tt.rx||0))>0?tt.total-(tt.tx||0)-(tt.rx||0):'-'}</td>
            <td style="padding:9px 12px;color:#7f8c8d;font-size:12px;">100%</td>
            <td style="padding:9px 12px;text-align:right;color:#f1c40f;font-weight:bold;font-size:12px;">${fmtB(tt.bytes||0)}</td>
            <td style="padding:9px 12px;color:#7f8c8d;font-size:12px;">100%</td></tr>`:'';
        const distBar = ts.filter(r=>r.pct_frames>0).map(r=>{
            const col=PROTO_COLORS[r.proto]||'#95a5a6';
            return `<div style="width:${r.pct_frames}%;background:${col};height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;" title="${esc(r.proto)}: ${r.total}프레임">`
                +(r.pct_frames>8?`<span style="font-size:10px;color:#fff;font-weight:bold;padding:0 3px;">${esc(r.proto)}</span>`:'')+'</div>';
        }).join('');
        const legend = ts.filter(r=>r.total>0).map(r=>`<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:#bdc3c7;">
            <span style="width:10px;height:10px;border-radius:2px;background:${PROTO_COLORS[r.proto]||'#95a5a6'};display:inline-block;"></span>
            ${esc(r.proto)} <span style="color:#7f8c8d;">${r.total}프레임</span></div>`).join('');
        trafficHtml = `<div style="background:linear-gradient(135deg,#0d1923,#0d2137);border:1px solid #1a3a4a;border-radius:12px;padding:20px 22px;margin-bottom:16px;">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
                <span style="font-size:16px;font-weight:bold;color:#fff;">&#x1F4E1; 트래픽 요약</span>
                ${tt.local_ip?`<span style="font-size:12px;color:#7f8c8d;">기준 IP: <code style="background:#0d1923;color:#f1c40f;padding:2px 7px;border-radius:3px;">${esc(tt.local_ip)}</code> <span style="margin-left:6px;">${tt.total}프레임 / ${fmtB(tt.bytes||0)}</span></span>`:''}
            </div>
            <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:13px;">
                <thead><tr style="border-bottom:2px solid #1a3a4a;">
                    <th style="padding:8px 12px;text-align:left;color:#7f8c8d;font-weight:normal;">프로토콜</th>
                    <th style="padding:8px 12px;text-align:right;color:#7f8c8d;font-weight:normal;">총프레임</th>
                    <th style="padding:8px 12px;text-align:right;color:#5dade2;font-weight:normal;">&#x1F4E4;송신</th>
                    <th style="padding:8px 12px;text-align:right;color:#58d68d;font-weight:normal;">&#x1F4E5;수신</th>
                    <th style="padding:8px 12px;text-align:right;color:#f39c12;font-weight:normal;">&#x1F4E1;기타</th>
                    <th style="padding:8px 12px;text-align:left;color:#7f8c8d;font-weight:normal;min-width:130px;">프레임 비율</th>
                    <th style="padding:8px 12px;text-align:right;color:#7f8c8d;font-weight:normal;">데이터</th>
                    <th style="padding:8px 12px;text-align:left;color:#7f8c8d;font-weight:normal;min-width:100px;">데이터 비율</th>
                </tr></thead>
                <tbody>${rows}${totalRow}</tbody>
            </table></div>
            <div style="margin-top:14px;padding-top:12px;border-top:1px solid #1a3a4a;">
                <div style="font-size:11px;color:#7f8c8d;margin-bottom:7px;">&#x1F4CA; 프로토콜 분포</div>
                <div style="display:flex;height:18px;border-radius:5px;overflow:hidden;gap:1px;">${distBar}</div>
                <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;">${legend}</div>
            </div>
        </div>`;
    }

    statsArea.innerHTML = trafficHtml + `
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">${s.total_files||0}</div><div class="stat-label">Files</div></div>
            <div class="stat-card"><div class="stat-value">${s.total_packets||0}</div><div class="stat-label">Packets</div></div>
            <div class="stat-card"><div class="stat-value">${s.total_rules||0}</div><div class="stat-label">Rules</div></div>
            <div class="stat-card"><div class="stat-value">${s.processing_time||0}s</div><div class="stat-label">Time</div></div>
        </div>
        ${chips ? `<h4>&#x1F52C; Protocol Breakdown</h4><div class="proto-breakdown">${chips}</div>` : ''}`;
}

// ── 파일별 결과 ──────────────────────────────
function renderResults(results) {
    fileResults.innerHTML = results.map((r,i) => buildCard(r,i)).join('');
}

function buildCard(r, idx) {
    if (!r.success) return `<div class="file-result error"><div class="file-header"><span class="file-name">❌ ${esc(r.filename||'?')}</span><span style="color:#dc3545">${esc(r.error||'')}</span></div></div>`;
    const sc = r.false_positive_score < 30 ? 'score-low' : r.false_positive_score < 60 ? 'score-medium' : 'score-high';
    const ps = r.proto_stats || {};
    const chips = Object.entries(ps).filter(([,v])=>v>0).map(([k,v])=>`<span class="proto-badge proto-${k}">${k}:${v}</span>`).join('');

    return `
    <div class="file-result ${r.has_patterns?'has-patterns':''}" id="fres-${idx}">
        <div class="file-header" onclick="toggleFile(${idx})">
            <span class="file-name">📄 ${esc(r.filename)}</span>
            <span class="file-badge">${r.packet_count} pkts</span>
            <span class="file-score ${sc}">FP: ${r.false_positive_score}/100</span>
            <span class="toggle-icon">▼</span>
        </div>
        <div id="fc-${idx}" class="file-content">
            <div class="file-stats">
                <span>📦 Payloads: ${r.payload_count}</span>
                <span>📝 Rules: ${r.rule_count}</span>
                ${r.has_patterns?'<span style="color:#dc3545">⚠️ Attack patterns!</span>':''}
            </div>
            ${chips?`<div style="margin-bottom:10px">${chips}</div>`:''}
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(${idx},'rules',event)">📝 Rules (${r.rule_count})</button>
                <button class="tab-btn"        onclick="switchTab(${idx},'payloads',event)">📦 Payloads (${r.payload_info?r.payload_info.length:0})</button>
            </div>
            <div id="rules-${idx}" class="tab-content active">
                <div class="rules-list">${buildRulesHTML(r.rules||[])}</div>
            </div>
            <div id="payloads-${idx}" class="tab-content">
                ${buildPayloadsHTML(r.payload_info||[])}
            </div>
        </div>
    </div>`;
}

function buildRulesHTML(rules) {
    const SHOW_LIMIT = 200;  // 한 번에 표시할 최대 룰 수
    const shown = rules.slice(0, SHOW_LIMIT);
    const rest  = rules.length - shown.length;
    let html = shown.map(rule => {
        const parts = rule.split('\n');
        const fl    = parts.length > 1 ? parts[0] : '';
        const rl    = parts.length > 1 ? parts[1] : parts[0];
        const fn    = fl.includes('# Frame') ? fl.replace('# Frame','').trim() : '';
        const cls   = rl.includes('CRITICAL') ? 'sev-CRITICAL' : rl.includes('HIGH') ? 'sev-HIGH' : rl.includes('MEDIUM') ? 'sev-MEDIUM' : 'sev-LOW';
        return `<div class="rule-line ${cls}">${fn?`<span class="frame-label">Frame ${esc(fn)}</span>`:''}${esc(rl)}</div>`;
    }).join('') || '<span style="color:#888">No rules</span>';
    if (rest > 0) {
        html += `<div style="margin-top:8px;padding:6px 10px;background:#1a3a4a;border-radius:4px;font-size:11px;color:#7fb3f5;">
            ... 외 ${rest}개 룰 (전체 ${rules.length}개) — 다운로드 버튼으로 전체 확인
        </div>`;
    }
    return html;
}

function buildPayloadsHTML(payloads) {
    if (!payloads.length) return '<div>No payload data</div>';
    const SHOW_LIMIT = 100;  // 한 번에 표시할 최대 페이로드 수
    const shown = payloads.slice(0, SHOW_LIMIT);
    const rest  = payloads.length - shown.length;
    let html = shown.map((p, i) => {
        if (!p) return '';
        const pc       = PROTO_COLORS[p.protocol]||'#999';
        const frameNo  = p.frame_no || i + 1;

        // Hex+ASCII 나란히 보기
        const hexRows = (p.hex_rows||[]).map(row =>
            `<tr>
                <td class="hd-offset">${esc(row.offset)}</td>
                <td class="hd-hex">${esc(row.hex)}</td>
                <td class="hd-ascii">${esc(row.ascii)}</td>
            </tr>`
        ).join('');

        // ── 예외처리: 포트 443 등 룰 생성 제외 ─────────────────────────
        let ruleSection = '';
        if (p.skipped_reason) {
            ruleSection = `
                <div style="margin:8px 0;padding:7px 12px;background:#fdf2f2;border-left:4px solid #e74c3c;border-radius:0 5px 5px 0;font-size:11px;color:#922b21;">
                    🚫 룰 생성 제외 — ${esc(p.skipped_reason)}
                </div>`;

        // ── 전역 화이트리스트 일치 (정상 패킷) — 모든 프로토콜 공통 ────
        } else if (p.wl_matched) {
            ruleSection = `
                <div style="margin:8px 0;padding:7px 12px;background:#eafaf1;border-left:4px solid #27ae60;border-radius:0 5px 5px 0;font-size:11px;color:#1e8449;">
                    ✅ 화이트리스트 일치 — 정상 패킷으로 판정, 룰 생성 제외
                    <span style="background:#d5f5e3;color:#1a5c38;font-size:10px;padding:1px 6px;border-radius:3px;margin-left:4px;">${esc(p.protocol||'')}</span><br>
                    <span style="color:#566573;font-size:10px;">${esc(p.wl_reason||'')}</span>
                </div>`;

        // ── 1단계: 키워드 탐지 우선 ──────────────────────────────────────
        } else if (p.kw_detected) {
            // 키워드 매칭 있음
            const catBadges = (p.kw_categories||[]).map(c =>
                `<span style="background:#2c3e50;color:#f1c40f;font-size:10px;padding:1px 7px;border-radius:3px;">${esc(c)}</span>`
            ).join(' ');
            const kwCodes = (p.kw_keywords||[]).map(k =>
                `<code style="background:#fff3cd;color:#7d6608;font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid #f0e68c;">${esc(k)}</code>`
            ).join(' ');
            const sevCls = (p.kw_severity==='CRITICAL')?'sev-CRITICAL':(p.kw_severity==='HIGH')?'sev-HIGH':(p.kw_severity==='MEDIUM')?'sev-MEDIUM':'sev-LOW';

            const kwRulesHTML = (p.kw_rules||[]).map(rule => {
                const rp = rule.split('\n'); const rl = rp.length>1?rp[1]:rp[0];
                const cls = rl.includes('CRITICAL')?'sev-CRITICAL':rl.includes('HIGH')?'sev-HIGH':rl.includes('MEDIUM')?'sev-MEDIUM':'sev-LOW';
                return `<div class="pkt-rule-entry ${cls}">${esc(rl)}</div>`;
            }).join('');

            ruleSection = `
                <div style="margin:8px 0;padding:8px 12px;background:#fff8e1;border-left:4px solid #f39c12;border-radius:0 5px 5px 0;">
                    <strong style="font-size:11px;">🔑 Keyword Matches (${(p.kw_keywords||[]).length})
                        <span style="font-weight:normal;color:#888;"> — <span class="${sevCls}">${p.kw_severity||'LOW'}</span></span>
                    </strong>
                    <div style="margin-top:5px;">${catBadges}</div>
                    <div style="margin-top:4px;">${kwCodes}</div>
                </div>
                ${kwRulesHTML ? `<div style="margin:4px 0;"><strong style="font-size:10px;">📋 Keyword Rules — Frame ${frameNo}:</strong><div class="pkt-rules-box">${kwRulesHTML}</div></div>` : ''}`;
        } else {
            // ── 키워드 없음 안내 + 2단계: 프로토콜 룰 ────────────────────
            const protoRulesHTML = (p.generated_rules||[]).map(rule => {
                const rp = rule.split('\n'); const rl = rp.length>1?rp[1]:rp[0];
                const cls = rl.includes('CRITICAL')?'sev-CRITICAL':rl.includes('HIGH')?'sev-HIGH':rl.includes('MEDIUM')?'sev-MEDIUM':'sev-LOW';
                return `<div class="pkt-rule-entry ${cls}">${esc(rl)}</div>`;
            }).join('');

            ruleSection = `
                <div style="margin:8px 0;padding:5px 12px;background:#f0f4f8;border-left:4px solid #95a5a6;border-radius:0 5px 5px 0;font-size:11px;color:#7f8c8d;">
                    🔍 키워드 탐지 없음 — 프로토콜 기반 Snort 룰 자동 생성으로 진행
                </div>
                ${protoRulesHTML ? `<div style="margin:4px 0;"><strong style="font-size:10px;">📋 Protocol Rules — Frame ${frameNo}:</strong><div class="pkt-rules-box">${protoRulesHTML}</div></div>` : ''}`;
        }

        return `
        <div class="payload-item ${p.has_pattern?'has-pattern':''}">
            <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px; font-size:12px;">
                <span class="frame-label">Frame ${frameNo}</span>
                <span class="proto-badge proto-${p.protocol}" style="background:${pc}">${p.protocol}</span>
                <span>📏 ${p.length||0} bytes</span>
                <span>Printable: ${p.printable_percent||0}%</span>
            </div>
            ${(p.patterns||[]).map(pt=>`<span class="mini-badge">${esc(pt)}</span>`).join('')}
            ${ruleSection}
            <div class="hexdump-wrap">
                <table>
                    <thead><tr>
                        <td class="hd-offset" style="color:#6e7681;font-size:10px;">OFFSET</td>
                        <td class="hd-hex"    style="color:#6e7681;font-size:10px;">HEX</td>
                        <td class="hd-ascii"  style="color:#6e7681;font-size:10px;">ASCII</td>
                    </tr></thead>
                    <tbody>${hexRows}</tbody>
                </table>
            </div>
        </div>`;
    }).join('');
    if (rest > 0) {
        html += `<div style="margin-top:10px;padding:10px 16px;background:#1a2a3a;border:1px solid #2c4a6a;border-radius:6px;font-size:12px;color:#7fb3f5;text-align:center;">
            📦 전체 ${payloads.length}개 중 ${shown.length}개 표시 — 나머지 ${rest}개는 단일 파일 분석 페이지(/)에서 확인하세요
        </div>`;
    }
    return html;
}

// ── 유틸 ─────────────────────────────────────
function esc(t) { if(!t) return ''; const d=document.createElement('div'); d.textContent=String(t); return d.innerHTML; }

function toggleFile(i) {
    const c = document.getElementById(`fc-${i}`);
    const h = document.querySelector(`#fres-${i} .toggle-icon`);
    const v = c.style.display !== 'none';
    c.style.display = v ? 'none' : 'block';
    if(h) h.textContent = v ? '▶' : '▼';
}
function switchTab(fi, tab, e) {
    if(e) e.stopPropagation();
    ['rules','payloads'].forEach(t => { const el=document.getElementById(`${t}-${fi}`); if(el) el.classList.remove('active'); });
    const sel = document.getElementById(`${tab}-${fi}`); if(sel) sel.classList.add('active');
    const cont = document.querySelector(`#fc-${fi} .tabs`);
    if(cont) { cont.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); if(e&&e.target) e.target.classList.add('active'); }
}

async function downloadAllRules() {
    if (!analysisResults.length) { alert('No results'); return; }
    const res = await fetch('/download/rules', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({results:analysisResults}) });
    if (!res.ok) { alert('Download failed'); return; }
    const a = document.createElement('a'); a.href=URL.createObjectURL(await res.blob());
    a.download=`snort_rules_${new Date().toISOString().slice(0,10)}.rules`; a.click(); URL.revokeObjectURL(a.href);
}
async function downloadZip() {
    if (!analysisResults.length) { alert('No results'); return; }
    const res = await fetch('/download/zip', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({results:analysisResults}) });
    if (!res.ok) { alert('Download failed'); return; }
    const a = document.createElement('a'); a.href=URL.createObjectURL(await res.blob());
    a.download=`pcap_analysis_${new Date().toISOString().slice(0,10)}.zip`; a.click(); URL.revokeObjectURL(a.href);
}
