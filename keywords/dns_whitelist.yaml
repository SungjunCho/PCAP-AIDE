# =============================================================================
# PCAP Analyzer — DNS 정상 도메인 화이트리스트
# =============================================================================
#
# 이 파일에 등록된 도메인은 VirusTotal 조회 없이 즉시 "정상"으로 판정됩니다.
#
# 규칙:
#   - 도메인명은 소문자로 입력 (비교 시 자동 소문자 변환)
#   - 서브도메인 포함 매칭: "windows.com" 등록 시
#     "update.windows.com", "ctldl.windowsupdate.com" 등 모두 포함
#   - exact: true 설정 시 해당 도메인만 정확 일치 (서브도메인 제외)
#   - category 는 표시용 분류명
# =============================================================================

version: "1.0"

domains:

  # ── Microsoft / Windows Update ─────────────────────────────────────────────
  - domain: "windowsupdate.com"
    category: "Microsoft / Windows Update"
    note: "Windows 업데이트 서버"

